# Local service stack for the Trading OS.
# All services bind to 127.0.0.1 only; never expose to a public interface.
# Named volumes persist local state; credentials here are local-development only.

name: trading-os

services:
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    environment:
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading
      POSTGRES_DB: trading
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d trading"]
      interval: 5s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:8.0-alpine
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  fuseki:
    image: stain/jena-fuseki:5.0.0
    environment:
      ADMIN_PASSWORD: admin
      FUSEKI_DATASET_1: trading
    ports:
      - "127.0.0.1:3030:3030"
    volumes:
      - fuseki_data:/fuseki
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3030/$$/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5.25-community
    environment:
      NEO4J_AUTH: neo4j/trading-local
      NEO4J_server_memory_pagecache_size: 256M
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  valkey_data:
  fuseki_data:
  neo4j_data:
