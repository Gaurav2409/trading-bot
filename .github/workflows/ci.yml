name: CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb:2.17.2-pg16
        env:
          POSTGRES_USER: trading
          POSTGRES_PASSWORD: trading
          POSTGRES_DB: trading
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trading -d trading"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Async driver for the app; the integration suite may override per test.
      DATABASE_URL: postgresql+asyncpg://trading:trading@localhost:5432/trading
      TEST_DATABASE_URL: postgresql+asyncpg://trading:trading@localhost:5432/trading

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Ruff
        run: uv run ruff check src tests

      - name: mypy (strict)
        run: uv run mypy src/trading_os

      - name: pytest
        run: uv run pytest -v

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm ci || npm install
      - name: Vitest
        run: npm test -- --run
      - name: Build
        run: npm run build
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Playwright e2e
        run: npm run e2e
